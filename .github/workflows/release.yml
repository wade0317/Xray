name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: zip
        run: |
          chmod +x xray.sh install.sh
          zip -9vr code.zip . -x .\*
      - name: release
        uses: softprops/action-gh-release@v1
        with:
          files: code.zip
          tag_name: ${{ github.ref_name }}
